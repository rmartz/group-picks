name: "Setup"
description: "Install pnpm, Node.js, and project dependencies"

inputs:
  frozen-lockfile:
    description: "Use --frozen-lockfile for pnpm install"
    required: false
    default: "true"
  token:
    description: "GitHub token for authenticating private git dependencies (e.g. GH_PAT secret)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Configure git auth for private GitHub dependencies
      if: ${{ inputs.token != '' }}
      run: |
        git config --global url."https://x-access-token:${{ inputs.token }}@github.com/".insteadOf "git@github.com:"
        git config --global url."https://x-access-token:${{ inputs.token }}@github.com/".insteadOf "https://github.com/"
      shell: bash
    - uses: pnpm/action-setup@v5
      with:
        version: 10
    - uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: "pnpm"
    - run: pnpm install ${{ inputs.frozen-lockfile == 'true' && '--frozen-lockfile' || '--no-frozen-lockfile' }}
      shell: bash
