name: Bootstrap Sentry secrets in Vercel

# One-time manual trigger to push SENTRY_DSN and SENTRY_AUTH_TOKEN into
# Vercel as encrypted secrets. Run this once per project setup; afterwards
# secrets are rotated via sync-env --rotate-keys (or left stable indefinitely).
#
# Prerequisites:
#   - VERCEL_TOKEN in GitHub repository secrets
#   - SENTRY_AUTH_TOKEN in GitHub repository secrets
#
# After this workflow succeeds you can delete or disable it.
on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment (leave blank for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — print changes without writing to Vercel"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  init-sentry:
    name: Init Sentry secrets
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'production' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Bootstrap Sentry secrets
        run: |
          ARGS="--init sentry"
          if [ -n "${{ inputs.env }}" ]; then
            ARGS="$ARGS --env ${{ inputs.env }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          pnpm exec sync-env $ARGS
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
