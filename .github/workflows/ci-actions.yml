name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  # Classify the PR diff so heavy jobs can skip work that cannot affect them.
  # Default-to-run: a file is "code" unless it is provably-inert documentation,
  # so configs, lockfiles, assets and unknown types always run the suite (#332).
  # On push (not a PR) everything runs. Stories are tracked separately so the
  # screenshots job runs only when an intended visual change is made (#331).
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code_changed: ${{ steps.classify.outputs.code_changed }}
      stories_changed: ${{ steps.classify.outputs.stories_changed }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            echo "stories_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          changed="$(git diff --name-only "$base"..."$head")"
          printf 'Changed files:\n%s\n' "$changed"

          # Inert documentation that cannot affect the build or tests. Anything
          # not matching this denylist counts as code, so the suite runs by
          # default and only provably-safe docs are skipped.
          doc_regex='(^|/)LICENSE$|\.(md|txt)$'
          if printf '%s\n' "$changed" | grep -Ev "$doc_regex" | grep -q .; then
            code_changed=true
          else
            code_changed=false
          fi

          # A changed Storybook test/story implies intended visual behavior
          # changed, so screenshots should validate the new result.
          if printf '%s\n' "$changed" | grep -Eq '\.stories\.(ts|tsx|js|jsx|mdx)$'; then
            stories_changed=true
          else
            stories_changed=false
          fi

          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"
          echo "stories_changed=$stories_changed" >> "$GITHUB_OUTPUT"
          printf 'Resolved: code_changed=%s stories_changed=%s\n' "$code_changed" "$stories_changed"

  tests:
    name: Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  type-check:
    name: Type Check
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  storybook-tests:
    name: Storybook Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7.0.0
      # Playwright Chromium is installed (and cached) by the shared setup action.
      - uses: ./.github/actions/setup
        with:
          playwright: chromium
      - run: pnpm storybook-tests

  storybook-build:
    name: Storybook Build
    needs: detect-changes
    # Gate on the broad code_changed signal (like storybook-tests and build), NOT
    # stories_changed: a non-story change (a .storybook/ preset, a preview
    # decorator, an addon/MDX config, a global CSS import) can break
    # `pnpm build-storybook` without touching a *.stories.* file, and would ship
    # green if this only ran on story changes (#372). This is a gating check with
    # no continue-on-error — distinct from the advisory storybook-screenshots job,
    # which also builds Storybook but reports its build neutral.
    #
    # It also renders canary Redux-connected stories from the built bundle
    # (check-storybook-render.mjs) to guard the Vite 8 / Rolldown reselect
    # tree-shaking regression — a render break that a compile-only build can't
    # catch. That watchdog keeps a Dependabot Vite 8 bump red until the bundler
    # is fixed, which is why Chromium is installed here.
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
        with:
          playwright: chromium
      - run: pnpm build-storybook
      - name: Guard built-Storybook render (Vite 8 reselect regression)
        run: node scripts/check-storybook-render.mjs

  storybook-screenshots:
    name: Storybook Screenshots
    needs: detect-changes
    # Only when a Storybook story/test changed (#331): a story change signals an
    # intended visual change worth eyeballing. The same-repo guard keeps the
    # branch push + PR comment off fork PRs (their GITHUB_TOKEN is read-only).
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.detect-changes.outputs.stories_changed == 'true'
    # Per-ref (same-branch) superseding only — a new commit cancels the prior
    # run. Screenshots publish to a per-PR `gh-screenshots-pr-<N>` branch (#339),
    # so there is no resource shared across PRs; this group can never evict an
    # unrelated PR's run the way the old global group did (#336).
    concurrency:
      group: storybook-screenshots-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    # Job-level continue-on-error keeps this advisory job non-blocking while
    # letting the capture step report a real `failure` (→ routed to fix-review)
    # instead of being swallowed to neutral. A bad/hung story is usually
    # agent-fixable, so it should surface as a failure, not a job timeout →
    # cancellation (which requires human escalation). The capture script fails
    # fast (its own wall-clock deadline, below) so the timeout path is a last
    # resort, not the only way the job goes non-green.
    continue-on-error: true
    # Backstop cap; the capture script's deadline and the step timeout both fire
    # first, as failures rather than a job cancellation.
    timeout-minutes: 8
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      # Playwright Chromium is installed (and cached) by the shared setup action.
      # continue-on-error preserves advisory semantics: a transient apt/Playwright
      # failure here should not block merge, matching the old behaviour where the
      # install ran inside the continue-on-error capture step (#283).
      - uses: ./.github/actions/setup
        continue-on-error: true
        with:
          playwright: chromium
      - name: List changed files
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" > changed-files.txt
      # No step-level continue-on-error here (unlike the setup step): a non-zero
      # exit from the capture script must surface as a `failure` so it routes to
      # fix-review. The job-level continue-on-error above keeps that failure
      # non-blocking (advisory, never a merge gate — #339). The step timeout is a
      # backstop; the script's own wall-clock deadline exits non-zero first.
      # Capture reuses the Chromium installed by the setup action.
      - name: Capture and publish screenshots
        timeout-minutes: 6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pnpm build-storybook
          node scripts/capture-screenshots.mjs \
            --static-dir=storybook-static \
            --out=screenshots \
            --changed-files=changed-files.txt
          if ! ls screenshots/*.png >/dev/null 2>&1; then
            echo "No screenshots captured; nothing to publish."
            exit 0
          fi
          PR="${{ github.event.pull_request.number }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          SS_BRANCH="gh-screenshots-pr-${PR}"
          PUBDIR="$(mktemp -d)"
          cp screenshots/*.png "$PUBDIR"/
          git -C "$PUBDIR" init -q -b "$SS_BRANCH"
          git -C "$PUBDIR" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$PUBDIR" config user.name "github-actions[bot]"
          git -C "$PUBDIR" add -A
          git -C "$PUBDIR" commit -q -m "Storybook screenshots for PR #${PR} (${HEAD_SHA})"
          git -C "$PUBDIR" push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$SS_BRANCH"
          node scripts/post-screenshots-comment.mjs \
            --pr="$PR" --branch="$SS_BRANCH" --sha="$HEAD_SHA" --dir=screenshots

  build:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
