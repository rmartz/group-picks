version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Wait 7 days after a version is published before opening an update PR, so a
    # compromised release has time to be detected and yanked before we pull it
    # in (supply-chain exposure reduction).
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group only minor and patch bumps into one PR per dependency type. Major
    # bumps match no group and are raised as individual PRs, since they are the
    # most likely to need a code change and warrant isolated review.
    groups:
      # Prettier (and its plugins) is special-cased: a minor bump can change
      # formatting output and force code changes, so isolate major + minor bumps
      # into their own PR for focused review. A trivial patch bump is not in this
      # group's update-types, so it falls through to dev-dependencies and stays
      # grouped with other low-risk bumps. Listed first to win group-assignment
      # precedence (a dependency joins the first group whose patterns match).
      prettier:
        patterns:
          - "prettier"
          - "prettier-plugin-*"
        update-types:
          - "major"
          - "minor"
      dev-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      production-dependencies:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group minor and patch action bumps into one PR; major bumps match no
    # group and are raised as individual PRs, since they are the most likely to
    # need a workflow change and warrant isolated review (mirrors the npm
    # groups above).
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
