# gitleaks configuration
# https://github.com/gitleaks/gitleaks
#
# Extends the shared base config from vercel-deploy-scripts with project-specific
# allowlists and rules.

title = "group-picks"

[extend]
path = "node_modules/vercel-deploy-scripts/.gitleaks.toml"

[allowlist]
description = "Known safe patterns — placeholder values in documentation and config examples"
regexes = [
  # Placeholder values used in .env.example and documentation
  '''your-project-id''',
  '''your-project''',
  '''firebase-adminsdk-xxx''',
  # Example/truncated keys in ARCHITECTURE.md and README
  '''xxx@o\w+\.ingest\.sentry\.io''',
]
paths = [
  # .env.example contains only placeholder values
  ".env.example",
  # deployment YMLs contain only NEXT_PUBLIC_* Firebase client keys (intentionally public).
  # Schema enforcement (deployment/schema.yml) hard-denies all secret patterns in these files.
  '''deployment/.*\.yml''',
]
# Commits that introduced intentionally-public Firebase client config values.
# Using commits = [...] is the reliable suppression mechanism in gitleaks v8.24.3
# (top-level [[allowlists]] array tables are silently ignored in that version).
commits = [
  "a9cfa8a5f6596a47d3a515f7844c88dd64ebad63",
]

# Project-specific rules not covered by the base ruleset

[[rules]]
id = "firebase-private-key-rsa"
description = "Firebase RSA service account private key"
regex = '''-----BEGIN RSA PRIVATE KEY-----'''
tags = ["firebase", "key"]

[[rules]]
id = "firebase-admin-json"
description = "Firebase service account JSON blob (private_key_id field)"
regex = '''"private_key_id"\s*:\s*"[a-f0-9]{40}"'''
tags = ["firebase", "key"]

[[rules]]
id = "vercel-token"
description = "Vercel API token (token= pattern)"
regex = '''(?i)vercel[_-]?token['":\s=]+[A-Za-z0-9]{24,}'''
tags = ["vercel"]
