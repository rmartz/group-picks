# Public environment variables for the staging environment.
#
# Only non-sensitive variables belong here. All keys are validated against
# deployment/schema.yml — sensitive variables (private keys, auth tokens, DSNs)
# will be rejected by the pre-commit hook and CI.
#
# Sensitive variables are managed directly in Vercel and are never committed.
# Run `pnpm env:pull` to generate a local .env.local from Vercel's stored values.
#
# To update these values and sync them to Vercel: scripts/update-config.sh --env=staging

environment: staging

variables:
  # Firebase Client SDK — safe to expose; access control is enforced by Firebase security rules
  NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyBECVyfSZAlCbpq8PhXMO7ibrobmthnwGQ"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "group-picks-staging.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "group-picks-staging"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "group-picks-staging.firebasestorage.app"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "96289728286"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:96289728286:web:5070269973d98906f18b0f"
  NEXT_PUBLIC_FIREBASE_DATABASE_URL: ""

  # Firebase Admin SDK — project identifiers only, not credentials
  FIREBASE_PROJECT_ID: "group-picks-staging"
  FIREBASE_DATABASE_URL: ""

  # Sentry — slugs and public DSN (NEXT_PUBLIC_SENTRY_DSN is bundled into client JS; not a secret)
  # SENTRY_DSN (server-side) and SENTRY_AUTH_TOKEN are managed as Vercel secrets — not committed here
  SENTRY_ORG: "reedmartz"
  SENTRY_PROJECT: "group-picks"
  NEXT_PUBLIC_SENTRY_DSN: "https://afdaac1d008d17a140375eb11d8ef9b3@o4511071618072576.ingest.us.sentry.io/4511351012851712"
